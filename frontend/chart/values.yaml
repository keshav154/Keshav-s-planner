image:
  repository: your-registry/frontend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80

containerPort: 80

ingress:
  enabled: false
  hosts:
    - host: chart-example.local
      paths:
        - "/"
  annotations: {}

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
