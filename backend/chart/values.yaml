image:
  repository: your-registry/backend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80

containerPort: 3000

ingress:
  enabled: false
  hosts:
    - host: backend.local
      paths:
        - "/"
  annotations: {}

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
